<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bạch Thoại Phật Pháp - Player</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#F9F7F2',
                        ink: '#5D2E2E',
                        clay: '#8C4A4A',
                        clayHover: '#7A3E3E',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'paper': '0 4px 20px -2px rgba(93, 46, 46, 0.1)',
                        'float': '0 10px 30px -5px rgba(140, 74, 74, 0.4)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #F9F7F2; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #8C4A4A; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #7A3E3E; 
        }

        /* Custom Audio Tag (Webkit) */
        audio {
            border-radius: 9999px;
            height: 48px;
            outline: none;
            width: 100%;
        }
        audio::-webkit-media-controls-panel {
            background-color: #F9F7F2; /* Màu paper */
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            font-family: 'JetBrains Mono', monospace;
            color: #5D2E2E;
        }
    </style>
</head>
<body class="bg-paper font-sans text-ink h-screen flex flex-col overflow-hidden">

    <header class="w-full py-6 flex justify-center items-center shrink-0">
        <h1 class="text-2xl font-semibold tracking-wide flex items-center gap-3">
            <i class="fa-solid fa-leaf text-clay"></i>
            Bạch Thoại Phật Pháp
        </h1>
    </header>

    <main class="max-w-7xl mx-auto w-full flex-1 flex flex-col md:flex-row gap-6 p-4 md:p-6 overflow-hidden pt-0">
        
        <section class="w-full md:w-1/3 lg:w-1/4 bg-white rounded-3xl shadow-paper p-6 flex flex-col items-center shrink-0 relative transition-all duration-300">
            <div class="w-32 h-32 md:w-48 md:h-48 rounded-full bg-paper border-4 border-clay flex items-center justify-center mb-6 shadow-float transition-all duration-300 hover:scale-105">
                <i class="fa-solid fa-om text-5xl md:text-7xl text-clay opacity-80"></i>
            </div>
            
            <div class="text-center w-full mb-6">
                <span class="text-xs uppercase tracking-widest text-clay font-medium mb-1 block">Đang phát</span>
                <h2 id="cur-title" class="text-lg md:text-xl font-semibold text-ink line-clamp-2 min-h-[3.5rem]">
                    Vui lòng chọn một bài pháp...
                </h2>
            </div>
            
            <audio id="audio" controls class="mt-auto shadow-sm transition-all duration-300 hover:-translate-y-1"></audio>
        </section>

        <section class="w-full md:w-2/3 lg:w-3/4 flex-1 bg-white rounded-3xl shadow-paper flex flex-col overflow-hidden">
            <div class="p-5 border-b border-paper flex justify-between items-center bg-white z-10 shrink-0">
                <h3 class="font-semibold text-lg flex items-center">
                    <i class="fa-solid fa-list-ul mr-3 text-clay"></i> 
                    Danh sách phát
                </h3>
                <span id="track-count" class="text-sm font-mono text-clay bg-paper px-3 py-1 rounded-full shadow-inner">0 bài</span>
            </div>
            
            <div id="list" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                </div>
        </section>
    </main>

    <script>
        const audio = document.getElementById('audio');
        const list = document.getElementById('list');
        const title = document.getElementById('cur-title');
        const trackCount = document.getElementById('track-count');

        // Mảng dữ liệu dự phòng (Phục vụ cho việc test nếu không có file JSON)
        const fallbackData = [
            { url: '#', title: 'Bài 1: Nhận thức về vô thường trong đời sống', duration: '14:20' },
            { url: '#', title: 'Bài 2: Phương pháp thiền định hằng ngày', duration: '20:15' },
            { url: '#', title: 'Bài 3: Buông xả phiền não, tìm về chân tâm', duration: '18:45' }
        ];

        // Fetch data
        fetch('playlist.json')
            .then(r => r.json())
            .then(data => renderPlaylist(data))
            .catch(err => {
                console.warn('Không tìm thấy playlist.json, đang sử dụng dữ liệu mẫu.');
                renderPlaylist(fallbackData);
            });

        function renderPlaylist(data) {
            trackCount.innerText = `${data.length} bài`;
            
            list.innerHTML = data.map((t, index) => `
                <div class="item group flex items-center p-3 md:p-4 rounded-2xl cursor-pointer transition-all duration-300 hover:bg-paper border border-transparent"
                     onclick="play('${t.url}', '${t.title}', this)">
                    
                    <div class="w-10 h-10 shrink-0 rounded-full bg-paper text-clay flex items-center justify-center mr-4 shadow-sm group-hover:bg-clay group-hover:text-white transition-all duration-300 group-active:scale-95">
                        <i class="play-icon fa-solid fa-play text-sm ml-0.5"></i>
                    </div>
                    
                    <div class="flex-1 overflow-hidden pr-4">
                        <div class="font-medium text-ink truncate group-hover:text-clay transition-colors">${t.title}</div>
                        <div class="text-xs text-ink opacity-60 mt-0.5">Track ${String(index + 1).padStart(2, '0')}</div>
                    </div>
                    
                    <div class="text-clay font-mono text-sm opacity-80 shrink-0">${t.duration}</div>
                </div>
            `).join('');
        }

        function play(url, t, el) {
            // Xóa state active của tất cả các item
            document.querySelectorAll('.item').forEach(i => {
                i.classList.remove('bg-paper', 'border-clay', 'shadow-sm');
                i.classList.add('border-transparent');
                
                const icon = i.querySelector('.play-icon');
                if (icon) {
                    icon.classList.remove('fa-volume-high', 'animate-pulse', 'text-white');
                    icon.classList.add('fa-play', 'ml-0.5');
                    i.querySelector('.w-10').classList.remove('bg-clay', 'text-white');
                    i.querySelector('.w-10').classList.add('bg-paper', 'text-clay');
                }
            });

            // Set state active cho item được click
            el.classList.remove('border-transparent');
            el.classList.add('bg-paper', 'border-clay', 'shadow-sm');
            
            const activeIconContainer = el.querySelector('.w-10');
            const activeIcon = el.querySelector('.play-icon');
            
            if (activeIconContainer && activeIcon) {
                activeIconContainer.classList.remove('bg-paper', 'text-clay');
                activeIconContainer.classList.add('bg-clay', 'text-white');
                
                activeIcon.classList.remove('fa-play', 'ml-0.5');
                activeIcon.classList.add('fa-volume-high', 'animate-pulse');
            }

            // Cập nhật giao diện player
            title.innerText = t;
            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
